<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta-Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        
        <div class="left-section">
            
            <div class="phone-card">
                <img src="insta-logo.png" alt="" class="insta-img">
    
                <h1>Instagram</h1>
    
                <input type="text" placeholder="Mobile number, username or email">
    
                <input type="password" placeholder="Password">
    
                <p class="forgot">Forgot Password?</p>
    
                <button>Sign In</button>
    
                <div class="line"></div>
    
            </div>
        </div>
        <div class="right-section">

            <div class="desktop-card">
                <h2>Login into Instagram</h2>
                <input type="text" placeholder="Mobile number, username or email">
                <br>
                <input type="password" placeholder="Password">
                <br>
                <button id="login" class="btn">Log in</button>
                <br>
                <button id="forgot" class="btn">Forgot Password?</button>
                <br>
                <button id="facebook-btn" class="btn">Login with facebook</button>
                <br>
                <button id="signup-btn" class="btn">Create new account</button>
            </div>

        </div>
    </div>
</body>

</html>

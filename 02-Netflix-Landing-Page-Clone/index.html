<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Landing Page Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero-section">
        <div class="premium-banner"><h3>New to Netflix? Try 7 days for ₹0.</h3></div>

        <nav class="navbar">

            <div class="logo">
                <img src="Netflix-logo.svg" alt="">
            </div>

            <div class="nav-right">
                <select>
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
            </select>

            <button>Sign In </button>
            </div>
        </nav>

        <div class="hero-info">
            <h1>Unlimited Movies,</h1>
            <h1>shows, and more</h1>

            <h4>Plan start at ₹149. cancel anytime.</h4>
            <p>Ready to watch? Enter your email to start your membership.</p>        
        </div>
        
        <div class="email-section">
            <input type="email" placeholder="Email address">
            <button class="try">Try 7 days for ₹0.</button>
        </div>
        <p class="footer-note">New memberr only. Terms below</p>
    </div>
    
</body>
</html>
